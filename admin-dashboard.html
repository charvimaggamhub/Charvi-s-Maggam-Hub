<!DOCTYPE html>
<html>
<head>
<title>Admin Panel - Charvi's Maggam Hub</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="style.css">
</head>

<body>
<section class="sec">
<h2>Admin Dashboard</h2>
<div id="bookings"></div>
</section>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCBpSgYDgrzQ-Jq-Y8SfxRbIYiyNeY0F3I",
  authDomain: "charvis-maggam-hub-52cb4.firebaseapp.com",
  projectId: "charvis-maggam-hub-52cb4",
  storageBucket: "charvis-maggam-hub-52cb4.firebasestorage.app",
  messagingSenderId: "793498579364",
  appId: "1:793498579364:web:5ae6ef71f2294590225131",
  measurementId: "G-6GK3SV5P0Z"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

db.collection("bookings").orderBy("date","desc").onSnapshot(res=>{
 let data="";
 res.forEach(doc=>{
   let b = doc.data();

   if(!b.status) b.status = "Pending";  // default status

   data += `
   <div class="card">
     <h3>${b.name}</h3>
     <p><b>Phone:</b> ${b.phone}</p>
     <p><b>Service:</b> ${b.service}</p>
     <p><b>Message:</b> ${b.message}</p>
     <p><b>Status:</b> ${b.status}</p>
     <small>${b.date}</small>
     <br><br>

     <button onclick="updateStatus('${doc.id}','Pending')">Pending</button>
     <button onclick="updateStatus('${doc.id}','In Progress')">In Progress</button>
     <button onclick="updateStatus('${doc.id}','Completed')">Completed</button>

     <br><br>
     <button onclick="deleteBooking('${doc.id}')" style="background:#b00020">Delete Booking</button>
   </div>
   `;
 });

 document.getElementById("bookings").innerHTML=data;
});

function updateStatus(id,status){
 db.collection("bookings").doc(id).update({status:status});
 alert("Status Updated to " + status);
}

function deleteBooking(id){
 if(confirm("Are you sure you want to delete this booking?")){
   db.collection("bookings").doc(id).delete();
   alert("Booking Deleted");
 }
}
</script>

</body>
</html>
