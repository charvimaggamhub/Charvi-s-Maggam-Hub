<!DOCTYPE html>
<html>
<head>
<title>Admin Login - Charvi's Maggam Hub</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="style.css">
</head>

<body>
<section class="sec">
<h2>Admin Login</h2>

<div class="form">
<input type="password" id="pass" placeholder="Enter Admin Password">
<button onclick="login()">Login</button>
</div>

<p id="msg" style="color:red"></p>
</section>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCBpSgYDgrzQ-Jq-Y8SfxRbIYiyNeY0F3I",
  authDomain: "charvis-maggam-hub-52cb4.firebaseapp.com",
  projectId: "charvis-maggam-hub-52cb4",
  storageBucket: "charvis-maggam-hub-52cb4.firebasestorage.app",
  messagingSenderId: "793498579364",
  appId: "1:793498579364:web:5ae6ef71f2294590225131",
  measurementId: "G-6GK3SV5P0Z"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function login(){
 let email = "charvi.maggamhub@gmail.com";
 let pass = document.getElementById("pass").value;

 auth.signInWithEmailAndPassword(email, pass)
 .then(()=> window.location.href="admin-dashboard.html")
 .catch(()=> document.getElementById("msg").innerText="Incorrect Password");
}
</script>
</body>
