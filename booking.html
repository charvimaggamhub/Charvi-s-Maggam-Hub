<section class="sec">
<h2>Book Your Embroidery Work</h2>

<form onsubmit="saveBooking(event)" class="form">
<input type="text" id="name" placeholder="Your Name" required>
<input type="tel" id="phone" placeholder="Phone Number" required>
<input type="text" id="service" placeholder="Service Required">
<textarea id="message" placeholder="Describe Your Requirement"></textarea>
<button type="submit">Submit Booking</button>
<p id="status"></p>
</form>
</section>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCBpSgYDgrzQ-Jq-Y8SfxRbIYiyNeY0F3I",

  appId: "1:793498579364:web:5ae6ef71f2294590225131"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function saveBooking(e){
 e.preventDefault();

 let name = document.getElementById("name").value;
 let phone = document.getElementById("phone").value;
 let service = document.getElementById("service").value;
 let message = document.getElementById("message").value;

 db.collection("bookings").add({
   name, phone, service, message,
   date: new Date().toLocaleString(),
   status: "Pending"
 });

 emailjs.send("service_ik7tqj7","template_yuf0gir",{
  name, phone, service, message
 });

 document.getElementById("status").innerText =
   "Booking submitted successfully 🎉";
 e.target.reset();
}
</script>
